appId: com.playbackstudio.app
productName: Playback Studio
directories:
  output: release
  buildResources: build
# Empacota só o que o app precisa: o renderer (dist) e o main/preload (dist-electron).
files:
  - dist/**/*
  - dist-electron/**/*
# Deep link protocol: playbackstudio://
# Permite que o app receba callbacks de OAuth e outros links profundos.
protocols:
  - name: Playback Studio
    schemes:
      - playbackstudio
mac:
  category: public.app-category.music
  icon: build/icon.icns
  target:
    # Dois instaladores: Intel (x64) e Apple Silicon (arm64).
    - target: dmg
      arch:
        - x64
        - arm64
  # Nome fixo por arquitetura pra os links do GitHub Releases serem estáveis.
  artifactName: Playback-Studio-mac-${arch}.${ext}
  # Fase 0: sem assinatura de código. Assinar antes de liberar pros usuários.
  identity: null
win:
  icon: build/icon.png
  target:
    - nsis
  artifactName: Playback-Studio-win.${ext}
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
