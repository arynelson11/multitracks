appId: com.playbackstudio.app
productName: Playback Studio
directories:
  output: release
  buildResources: build
# Empacota só o que o app precisa: o renderer (dist) e o main/preload (dist-electron).
files:
  - dist/**/*
  - dist-electron/**/*
# Deep link protocol: playbackstudio://
# Permite que o app receba callbacks de OAuth e outros links profundos.
protocols:
  - name: Playback Studio
    schemes:
      - playbackstudio
mac:
  category: public.app-category.music
  target:
    - dmg
  # Nome fixo pra o link do GitHub Releases ser estável (independe da versão).
  artifactName: Playback-Studio-mac.${ext}
  # Fase 0: sem assinatura de código. Assinar antes de liberar pros usuários.
  identity: null
win:
  target:
    - nsis
  artifactName: Playback-Studio-win.${ext}
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
