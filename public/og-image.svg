<svg width="1200" height="1200" viewBox="0 0 1200 1200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="glow" cx="20%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#FF6B35" stop-opacity="0.28"/>
      <stop offset="60%" stop-color="#FF6B35" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#FF6B35" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="85%" cy="75%" r="45%">
      <stop offset="0%" stop-color="#5B6B47" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#5B6B47" stop-opacity="0"/>
    </radialGradient>
    <mask id="stem-cuts">
      <rect width="64" height="64" fill="white"/>
      <line x1="0" y1="22" x2="64" y2="22" stroke="black" stroke-width="4"/>
      <line x1="0" y1="32" x2="64" y2="32" stroke="black" stroke-width="4"/>
      <line x1="0" y1="42" x2="64" y2="42" stroke="black" stroke-width="4"/>
    </mask>
  </defs>

  <!-- Background fills the entire 1200x1200 so crop to center 1200x630 lands on the design band -->
  <rect width="1200" height="1200" fill="#121214"/>

  <!-- Design band: y=285 to y=915 (1200 wide x 630 tall, centered) -->
  <g>
    <!-- Glow effects within design band -->
    <rect y="285" width="1200" height="630" fill="url(#glow)"/>
    <rect y="285" width="1200" height="630" fill="url(#glow2)"/>

    <!-- Subtle grid lines -->
    <g opacity="0.04" stroke="#E8E8EC" stroke-width="1">
      <line x1="0" y1="442" x2="1200" y2="442"/>
      <line x1="0" y1="600" x2="1200" y2="600"/>
      <line x1="0" y1="757" x2="1200" y2="757"/>
      <line x1="300" y1="285" x2="300" y2="915"/>
      <line x1="600" y1="285" x2="600" y2="915"/>
      <line x1="900" y1="285" x2="900" y2="915"/>
    </g>

    <!-- PlayMark (left, scaled 2.8x = ~180px wide) -->
    <g transform="translate(90, 520) scale(2.8)">
      <path d="M 14 12 L 52 32 L 14 52 Z" fill="#FF6B35" mask="url(#stem-cuts)" stroke-linejoin="round"/>
    </g>

    <!-- Text -->
    <g font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" fill="#E8E8EC">
      <!-- Wordmark -->
      <text x="320" y="455" font-size="34" font-weight="700" letter-spacing="-0.5">
        Playback <tspan fill="#FF6B35" font-style="italic" font-weight="500">Studio</tspan>
      </text>

      <!-- Headline -->
      <text x="320" y="565" font-size="62" font-weight="700" letter-spacing="-2">
        Multitracks de qualquer
      </text>
      <text x="320" y="640" font-size="62" font-weight="700" letter-spacing="-2">
        música. Pronto pro
      </text>
      <text x="320" y="715" font-size="62" font-weight="700" letter-spacing="-2">
        <tspan fill="#FF6B35" font-style="italic" font-weight="600">domingo</tspan>.
      </text>

      <!-- Tagline -->
      <text x="320" y="785" font-size="24" font-weight="500" fill="#A8A8AC">
        Feito por quem toca.
      </text>

      <!-- URL bottom right -->
      <text x="1110" y="870" font-size="20" font-weight="600" fill="#FF6B35" text-anchor="end" letter-spacing="0.5">
        playbackstudio.com.br
      </text>
    </g>
  </g>
</svg>
